<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscaminas Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Buscaminas</h1>
    
    <div class="menu-dificultad">
        <button onclick="cambiarDificultad(8, 8, 10)">Fácil</button>
        <button onclick="cambiarDificultad(12, 12, 20)">Medio</button>
        <button onclick="cambiarDificultad(16, 16, 40)">Difícil</button>
    </div>

    <div class="marcador">
        MINAS: <span id="contador-banderas">10</span>
    </div>

    <!-- Contenedor relativo para los mensajes sobre el tablero -->
    <div class="tablero-container">
        <div id="tablero" class="tablero"></div>
        
        <!-- Carteles de estado -->
        <div id="mensaje-victoria" class="alerta">🏆 ¡VICTORIA!</div>
        <div id="mensaje-derrota" class="alerta">💥 ¡DERROTA!</div>
    </div>

    <button id="reset-btn" class="btn-primary">Reiniciar Juego</button>

    <script src="logic.js"></script>
    <script src="web_view.js"></script>
</body>
</html>
